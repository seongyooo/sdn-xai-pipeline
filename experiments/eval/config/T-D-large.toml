[experiment]
treatment = "T-D-large"
description    = "IR + Few-Shot + Grounding — IntentIR 형식, 정적 5개 데모, 토폴로지 인벤토리 주입"
output_format  = "intent_ir"
few_shot       = true
grounding      = true
dataset_path   = "experiments/eval/data/intents_eval_large.jsonl"
topology_path  = "experiments/eval/data/topology_large.json"
demos_path     = "experiments/eval/data/demonstrations.json"

[llm]
model          = "gemini-3.1-flash-lite"
temperature    = 0.2
max_tokens     = 1024
timeout_s      = 30.0
retries        = 2
