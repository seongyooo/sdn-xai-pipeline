[experiment]
treatment = "T-B-large"
description    = "IR Zero-Shot — IntentIR 형식, few-shot 없음, grounding 없음"
output_format  = "intent_ir"
few_shot       = false
grounding      = false
dataset_path   = "experiments/eval/data/intents_eval_large.jsonl"
topology_path  = "experiments/eval/data/topology_large.json"
demos_path     = ""

[llm]
model          = "gemini-3.1-flash-lite"
temperature    = 0.2
max_tokens     = 1024
timeout_s      = 30.0
retries        = 2
