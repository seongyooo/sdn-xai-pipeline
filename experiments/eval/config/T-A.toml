[experiment]
treatment      = "T-A"
description    = "Direct FlowRule — LLM이 ONOS FlowRule JSON을 직접 생성 (IR/컴파일러 없음)"
output_format  = "direct_flow"
few_shot       = false
grounding      = false
dataset_path   = "data/intents_v2.jsonl"
topology_path  = "experiments/eval/data/topology_eval.json"
demos_path     = ""   # 사용 안 함

[llm]
model          = "gemini-2.0-flash"
temperature    = 0.0
max_tokens     = 1024
timeout_s      = 30.0
retries        = 2
