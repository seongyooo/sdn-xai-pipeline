[experiment]
treatment = "T-A-large"
description    = "Direct FlowRule — LLM이 ONOS FlowRule JSON을 직접 생성 (IR/컴파일러 없음)"
output_format  = "direct_flow"
few_shot       = false
grounding      = false
dataset_path   = "experiments/eval/data/intents_eval_large.jsonl"
topology_path  = "experiments/eval/data/topology_large.json"
demos_path     = ""   # 사용 안 함

[llm]
model          = "gemini-3.1-flash-lite"
temperature    = 0.2
max_tokens     = 1024
timeout_s      = 30.0
retries        = 2
