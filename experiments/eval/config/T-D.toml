[experiment]
treatment      = "T-D"
description    = "IR + Few-Shot + Grounding — IntentIR 형식, 정적 5개 데모, 토폴로지 인벤토리 주입"
output_format  = "intent_ir"
few_shot       = true
grounding      = true
dataset_path   = "data/intents_v2.jsonl"
topology_path  = "experiments/eval/data/topology_eval.json"
demos_path     = "experiments/eval/data/demonstrations.json"

[llm]
model          = "gemini-2.0-flash"
temperature    = 0.0
max_tokens     = 1024
timeout_s      = 30.0
retries        = 2
